<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0F8F5F" />
<title>Offline · DaanSetu</title>
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif; background: #FAFAF8; color: #1F2937; display: flex; align-items: center; justify-content: center; padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom); }
  .card { max-width: 420px; width: 100%; background: #fff; border: 1px solid #E5E7EB; border-radius: 24px; padding: 32px; text-align: center; box-shadow: 0 24px 48px -32px rgba(15,143,95,0.25); }
  .badge { width: 56px; height: 56px; margin: 0 auto 16px; border-radius: 16px; background: #E8F5EE; display: flex; align-items: center; justify-content: center; }
  .badge svg { width: 28px; height: 28px; color: #0F8F5F; }
  h1 { font-size: 1.5rem; margin: 8px 0 4px; letter-spacing: -0.01em; }
  p { color: #6B7280; font-size: 0.95rem; line-height: 1.5; margin: 8px 0 24px; }
  button { background: #0F8F5F; color: #fff; border: 0; border-radius: 14px; padding: 12px 18px; font-size: 0.95rem; font-weight: 500; cursor: pointer; }
  small { display: block; margin-top: 20px; color: #6B7280; }
</style>
</head>
<body>
<div class="card">
  <div class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14 0"/><path d="M8.5 16.05a6 6 0 0 1 7 0"/><circle cx="12" cy="20" r="1"/><line x1="2" y1="2" x2="22" y2="22"/></svg></div>
  <h1>You're offline</h1>
  <p>No worries — DaanSetu works offline. Your donation drafts are saved locally and will sync the moment you're back.</p>
  <button onclick="location.reload()">Try again</button>
  <small>Crafted by Satvik Mishra</small>
</div>
</body>
</html>
